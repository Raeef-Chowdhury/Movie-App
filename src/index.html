<!DOCTYPE html>
<html class="text-[62.5%]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="output.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-[#001524] overflow-hidden">
    <header>
      <nav class="list-none px-[1.2rem] mt-[2.4rem]">
        <ul class="flex gap-[2.4rem] items-center justify-between">
          <div class="nav__heading">
            <li
              class="text-[4.8rem] text-[#529018] font-semibold tracking-[0.6rem]"
            >
              MOVIE APP
            </li>
          </div>
          <div
            class="nav__pages flex items-center justify-between gap-[4.8rem] mr-[9.6rem]"
          >
            <li
              class="text-gray-100 transition-all text-[1.8rem] hover:text-white hover:scale-[1.05] hover:transform-[translateY(-0.4rem)] hover:cursor-pointer"
            >
              Home
            </li>
            <li
              class="text-gray-100 transition-all text-[1.8rem] hover:text-white hover:scale-[1.05] hover:transform-[translateY(-0.4rem)] hover:cursor-pointer"
            >
              TV Shows
            </li>
            <li
              class="text-gray-100 transition-all text-[1.8rem] hover:text-white hover:scale-[1.05] hover:transform-[translateY(-0.4rem)] hover:cursor-pointer"
            >
              Movies
            </li>
            <li
              class="text-gray-100 transition-all text-[1.8rem] hover:text-white hover:scale-[1.05] hover:transform-[translateY(-0.4rem)] hover:cursor-pointer"
            >
              My List
            </li>
          </div>
          <div
            class="nav__serchbar flex items-center justify-between gap-[1.2rem]"
          >
            <div class="">
              <input
                type="text "
                placeholder="Search by name here..."
                class="search__input px-[2.4rem] py-[0.8rem] shadow-sm hover:shadow-md border-r-[3.6rem] transition-all text-[1.6rem] border-none text-gray-800 placeholder-gray-400 border border-gray-300 rounded-full bg-[#001524] w-[0] absolute top-[5%] right-[5%]"
              />
            </div>
            <ion-icon
              name="search-outline"
              class="text-[3.6rem] px-[1.2rem] text-[#314def] searchbar"
            ></ion-icon>
          </div>
        </ul>
      </nav>
    </header>
    <main class="main mx-[8rem]">
      <div class="card__list mt-[9.6rem] relative max-w-[90vw] overflow-hidden">
        <h1
          class="card__item--heading mb-[2.4rem] text-[#529018] text-[4.8rem] uppercase font-semibold border-[#314def] border-b-8"
        >
          Trending
        </h1>
        <ul
          class="card__list--box flex gap-[6.4rem] w-full h-[40rem] mx-[4.8rem]"
        ></ul>
      </div>
      <div class="arrows__box">
        <ion-icon
          name="chevron-back-outline"
          class="text-[8rem] text-white absolute top-[60%] left-[-1%] arrow__right"
        ></ion-icon
        ><ion-icon
          name="chevron-forward-outline"
          class="text-[8rem] text-white absolute top-[60%] left-[95%] arrow__left"
        ></ion-icon>
      </div>
    </main>
  </body>
  <script src="script.js"></script>
  <script
    type="module"
    src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
  ></script>
  <script
    nomodule
    src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
  ></script>
</html>
